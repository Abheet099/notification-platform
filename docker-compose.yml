services:
  postgres:
    image: postgres:16-alpine
    container_name: notification-platform-postgres
    environment:
      POSTGRES_DB: notification_platform
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user -d notification_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
